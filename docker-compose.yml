services:
  postgres:
    image: postgres:16-alpine
    container_name: college_accounts_db
    environment:
      POSTGRES_DB: college_accounts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: college_accounts_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/college_accounts
      - SECRET_KEY=your-super-secret-key-change-in-production-min-32-chars-long
      - CORS_ORIGINS=["http://localhost:5173","http://localhost","http://localhost:80"]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: >
      sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: college_accounts_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
